# Server-side snake_case. The multi-word record DTOs also carry @JsonNaming, which the rest-assured
# test client honours (it does not read this Spring property); this global default is the
# belt-and-suspenders for any future non-annotated DTO. Both are intentional — they cover the
# server and the test client respectively.
spring.jackson.property-naming-strategy=SNAKE_CASE
# Render errors (incl. validation 400, 404/405/415) as RFC 9457 application/problem+json.
spring.mvc.problemdetails.enabled=true
